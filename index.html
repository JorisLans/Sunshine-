<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonlicht Simulator - Fysiek Correcte 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #0a0a0a; }
        .main-container { display: flex; flex: 1; min-height: 0; gap: 4px; padding: 4px; }
        #map { flex: 1; border-radius: 8px; }
        #viewer3d { flex: 1; background: #050505; position: relative; border-radius: 8px; border: 1px solid #333; }
        .controls { 
            background: #ffffff; padding: 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.6); 
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; z-index: 100;
        }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .time-header { display: flex; justify-content: space-between; align-items: center; }
        label { font-weight: bold; font-size: 14px; color: #333; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .buttons { display: flex; gap: 8px; }
        button { flex: 1; padding: 10px; border: none; background: #2c3e50; color: white; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        #playBtn { flex: 0 0 100px; background: #f39c12; color: #000; }
        #playBtn.playing { background: #e74c3c; color: #fff; }
        .options-box { display: flex; gap: 15px; background: #f0f2f5; padding: 12px; border-radius: 8px; border: 1px solid #ccc; }
        .info-overlay { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); color: #fff; padding: 12px; border-radius: 8px; font-size: 12px; pointer-events: none; border-left: 4px solid #f39c12; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="map"></div>
        <div id="viewer3d">
            <div class="info-overlay" id="sunInfo">Laden...</div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <div class="time-header">
                <label>Tijd: <span id="timeVal">12:00</span></label>
                <button id="playBtn" onclick="togglePlay()">▶ Play</button>
            </div>
            <input type="range" id="timeSlider" min="0" max="1439" value="720">
            <label>Datum:</label>
            <input type="date" id="datePicker">
            <div class="buttons">
                <button onclick="setSeason('zomer')">Zomer</button>
                <button onclick="setSeason('winter')">Winter</button>
                <button onclick="setSeason('nu')">Nu</button>
            </div>
        </div>

        <div class="control-group">
            <label>Draai Appartement: <span id="rotationVal">180</span>°</label>
            <input type="range" id="rotationSlider" min="0" max="360" value="180">
            <div class="options-box">
                <label><input type="checkbox" id="roofToggle" checked onchange="updateSimulation()"> Dak</label>
                <label><input type="checkbox" id="wallsToggle" checked onchange="updateSimulation()"> Zijmuren</label>
            </div>
            <p style="font-size: 11px; color: #555; margin: 0;"><b>Check:</b> Om 9u staat de zon in het Oosten (rechts van Noord).</p>
        </div>
    </div>

    <script>
        let lat = 51.0289, lng = 3.0142, currentDate = new Date(), roomRotation = 180;
        const earthRadius = 6378137;
        const timeSlider = document.getElementById('timeSlider');
        const datePicker = document.getElementById('datePicker');
        datePicker.valueAsDate = currentDate;

        // --- KAART ---
        const map = L.map('map').setView([lat, lng], 19);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }).addTo(map);
        L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20, opacity: 0.8 }).addTo(map);

        let marker = L.marker([lat, lng], {draggable: true}).addTo(map);
        let mapSimulationLayer = L.featureGroup().addTo(map);

        function updateLocation(newLat, newLng) {
            lat = newLat; lng = newLng;
            marker.setLatLng([lat, lng]);
            updateSimulation();
        }
        map.on('click', function(e) { updateLocation(e.latlng.lat, e.latlng.lng); });
        marker.on('drag', function(e) { updateLocation(e.target.getLatLng().lat, e.target.getLatLng().lng); });

        // --- THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('viewer3d').appendChild(renderer.domElement);

        const controls3d = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(18, 14, 18);
        controls3d.update();

        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfffaed, 2.5);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.set(2048, 2048);
        scene.add(sunLight);

        const sunSphere = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffd700 }));
        scene.add(sunSphere);

        // Kompas-indicator (Rode pijl naar Noord)
        const arrowHelper = new THREE.ArrowHelper(new THREE.Vector3(0, 0, -1), new THREE.Vector3(0, 0.1, 0), 10, 0xff0000);
        scene.add(arrowHelper);

        let modelGroup = new THREE.Group();
        scene.add(modelGroup);

        function getMapPoint(x, y) {
            let rad = roomRotation * Math.PI / 180;
            let rx = x * Math.cos(rad) + y * Math.sin(rad);
            let ry = -x * Math.sin(rad) + y * Math.cos(rad);
            let dLat = (ry / earthRadius) * (180 / Math.PI);
            let dLng = (rx / (earthRadius * Math.cos(lat * Math.PI / 180))) * (180 / Math.PI);
            return [lat + dLat, lng + dLng];
        }

        function update3DModel() {
            modelGroup.clear();
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333 });

            const floor = new THREE.Mesh(new THREE.BoxGeometry(10, 0.1, 10), floorMat);
            floor.receiveShadow = true;
            modelGroup.add(floor);

            const terrace = new THREE.Mesh(new THREE.BoxGeometry(10, 0.1, 4), floorMat);
            terrace.position.set(0, 0, 7);
            terrace.receiveShadow = true;
            modelGroup.add(terrace);

            const createWall = (w, h, d, x, y, z) => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                wall.position.set(x, y, z);
                wall.castShadow = true;
                wall.receiveShadow = true;
                modelGroup.add(wall);
            };

            createWall(10, 3, 0.2, 0, 1.5, -5); 
            createWall(0.2, 3, 10, -5, 1.5, 0); 
            createWall(0.2, 3, 10, 5, 1.5, 0);  
            createWall(2.8, 3, 0.2, -3.6, 1.5, 5); 
            createWall(2.8, 3, 0.2, 3.6, 1.5, 5);
            createWall(4.4, 0.6, 0.2, 0, 2.7, 5); 

            if (document.getElementById('wallsToggle').checked) {
                createWall(0.2, 3, 4, -5, 1.5, 7); 
                createWall(0.2, 3, 4, 5, 1.5, 7);
            }

            if (document.getElementById('roofToggle').checked) {
                const roofMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
                const roof = new THREE.Mesh(new THREE.BoxGeometry(10, 0.2, 14), roofMat);
                roof.position.set(0, 3, 2);
                roof.castShadow = true;
                modelGroup.add(roof);
            }
        }

        function updateSimulation() {
            update3DModel();
            let sunPos = SunCalc.getPosition(currentDate, lat, lng);
            let azimuth = sunPos.azimuth; 
            let altitude = sunPos.altitude;

            // CORRECTIE: X-as omgedraaid (-sin) voor juiste Oost/West oriëntatie
            const dist = 40;
            const x = -dist * Math.sin(azimuth) * Math.cos(altitude);
            const y = dist * Math.sin(altitude);
            const z = dist * Math.cos(azimuth) * Math.cos(altitude);

            sunLight.position.set(x, y, z);
            sunSphere.position.set(x, y, z);
            sunLight.intensity = altitude > 0 ? 2.5 : 0;
            sunSphere.visible = altitude > 0;

            modelGroup.rotation.y = (180 - roomRotation) * Math.PI / 180;

            // 2D Kaart Sync
            mapSimulationLayer.clearLayers();
            let s = 5, w = 2.5;
            L.polygon([getMapPoint(-s,s), getMapPoint(s,s), getMapPoint(s,-s), getMapPoint(-s,-s)], {color:'#fff', weight:1, fillOpacity:0.1}).addTo(mapSimulationLayer);
            L.polyline([getMapPoint(-w,s), getMapPoint(w,s)], {color:'#3498db', weight:4}).addTo(mapSimulationLayer);

            document.getElementById('sunInfo').innerHTML = 
                `<strong>Hoogte:</strong> ${(altitude * 180 / Math.PI).toFixed(1)}°<br>` +
                `<strong>Azimuth:</strong> ${(azimuth * 180 / Math.PI + 180).toFixed(1)}°<br>` +
                `<em>(Oost: ~90°, Zuid: 180°, West: ~270°)</em>`;
        }

        // --- UI & EVENTS ---
        timeSlider.oninput = function() {
            currentDate.setHours(Math.floor(this.value / 60), this.value % 60);
            document.getElementById('timeVal').textContent = currentDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            updateSimulation();
        };
        document.getElementById('rotationSlider').oninput = function() {
            roomRotation = parseInt(this.value);
            document.getElementById('rotationVal').textContent = roomRotation;
            updateSimulation();
        };
        document.getElementById('datePicker').onchange = function() {
            let d = new Date(this.value);
            currentDate.setFullYear(d.getFullYear(), d.getMonth(), d.getDate());
            updateSimulation();
        };

        function setSeason(s) {
            let y = 2026;
            if(s === 'zomer') currentDate = new Date(y, 5, 21, 13, 0);
            if(s === 'winter') currentDate = new Date(y, 11, 21, 12, 0);
            if(s === 'nu') currentDate = new Date();
            document.getElementById('datePicker').valueAsDate = currentDate;
            timeSlider.value = currentDate.getHours() * 60 + currentDate.getMinutes();
            timeSlider.oninput();
        }

        let isPlaying = false, animationInterval;
        function togglePlay() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                document.getElementById('playBtn').innerHTML = '⏸ Pauze';
                animationInterval = setInterval(() => {
                    timeSlider.value = (parseInt(timeSlider.value) + 5) % 1440;
                    timeSlider.oninput();
                }, 50);
            } else {
                document.getElementById('playBtn').innerHTML = '▶ Play';
                clearInterval(animationInterval);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const w = document.getElementById('viewer3d').clientWidth;
            const h = document.getElementById('viewer3d').clientHeight;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.render(scene, camera);
        }

        updateSimulation();
        animate();
    </script>
</body>
</html>
