<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Zonlicht Simulator - Crash Fix</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #050505; }
        
        .main-container { display: flex; flex: 1; min-height: 0; gap: 4px; padding: 4px; }
        #map { flex: 1; border-radius: 8px; border: 1px solid #333; min-height: 200px; }
        
        /* FIX: Canvas krijgt nu een harde positie in de container zodat hij niet kan crashen */
        #viewer3d { flex: 1; background: #0a0a1a; position: relative; border-radius: 8px; border: 1px solid #333; min-height: 200px; overflow: hidden; }
        #viewer3d canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; display: block; outline: none; }

        .controls { 
            background: #ffffff; padding: 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.8); 
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; z-index: 100;
        }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .time-header { display: flex; justify-content: space-between; align-items: center; }
        label { font-weight: bold; font-size: 14px; color: #333; }
        
        input[type="range"] { width: 100%; cursor: pointer; }
        .buttons { display: flex; gap: 8px; }
        button { flex: 1; padding: 10px; border: none; background: #2c3e50; color: white; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        button:hover { background: #1a252f; }
        #playBtn { flex: 0 0 100px; background: #f39c12; color: #000; }
        #playBtn.playing { background: #e74c3c; color: #fff; }

        .options-box { display: flex; gap: 15px; background: #f0f2f5; padding: 12px; border-radius: 8px; border: 1px solid #ccc; }
        
        .info-overlay { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.9); color: #fff; 
            padding: 12px; border-radius: 8px; font-size: 12px; pointer-events: none; border-left: 4px solid #f39c12; z-index: 10;
        }
        .time-overlay3d {
            position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.15); color: #fff;
            padding: 10px 20px; border-radius: 8px; font-size: 32px; font-weight: bold; pointer-events: none;
            backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.3); z-index: 10;
        }

        @media (max-width: 800px) {
            .main-container { flex-direction: column; overflow-y: auto; }
            #map, #viewer3d { flex: none; height: 40vh; }
            .controls { grid-template-columns: 1fr; max-height: 40vh; overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="map"></div>
        
        <div id="viewer3d">
            <div class="info-overlay" id="sunInfo">Laden...</div>
            <div class="time-overlay3d" id="timeOverlay3D">12:00</div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <div class="time-header">
                <label>Tijd: <span id="timeVal">12:00</span></label>
                <button id="playBtn" onclick="togglePlay()">▶ Play</button>
            </div>
            <input type="range" id="timeSlider" min="0" max="1439" value="720">
            <label>Datum:</label>
            <input type="date" id="datePicker">
            <div class="buttons">
                <button onclick="setSeason('zomer')">Zomer</button>
                <button onclick="setSeason('winter')">Winter</button>
                <button onclick="setSeason('nu')">Nu</button>
            </div>
        </div>

        <div class="control-group">
            <label>Draai Appartement: <span id="rotationVal">180</span>°</label>
            <input type="range" id="rotationSlider" min="0" max="360" value="180">
            
            <div class="options-box">
                <label><input type="checkbox" id="roofToggle" checked onchange="handleModelChange()"> Dak tonen</label>
                <label><input type="checkbox" id="wallsToggle" checked onchange="handleModelChange()"> Zijmuren</label>
            </div>
            <p style="font-size: 11px; color: #555; margin: 0;"><b>Fix:</b> Rendering-crash opgelost. Basislamp staat feller zodat je altijd iets ziet.</p>
        </div>
    </div>

    <script>
        let lat = 51.0289, lng = 3.0142; 
        const earthRadius = 6378137;
        let roomRotation = 180; 

        // Dimensies van de kamer
        let s = 5, w = 2.5, tD = 4, h = 2.7;

        let currentDate = new Date();
        const timeSlider = document.getElementById('timeSlider');
        const datePicker = document.getElementById('datePicker');

        // --- 1. KAART INITIALISATIE ---
        const map = L.map('map').setView([lat, lng], 19);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }).addTo(map);
        L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20, opacity: 0.9 }).addTo(map);

        let marker = L.marker([lat, lng], {draggable: true}).addTo(map);
        let mapSimulationLayer = L.featureGroup().addTo(map);

        function updateLocation(newLat, newLng) {
            lat = newLat; lng = newLng;
            marker.setLatLng([lat, lng]);
            updateSimulation();
        }

        map.on('click', (e) => updateLocation(e.latlng.lat, e.latlng.lng));
        marker.on('drag', (e) => updateLocation(e.target.getLatLng().lat, e.target.getLatLng().lng));

        // --- 2. THREE.JS INITIALISATIE (CRASH FIX) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        
        const viewerDiv = document.getElementById('viewer3d');
        const camera = new THREE.PerspectiveCamera(45, viewerDiv.clientWidth / viewerDiv.clientHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
        // Forceer grootte 1x direct
        renderer.setSize(viewerDiv.clientWidth, viewerDiv.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        viewerDiv.appendChild(renderer.domElement);

        const controls3d = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(18, 15, 18);
        controls3d.update();

        // FIX: Sterker basislicht zodat de app nóóit pikzwart kan zijn
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); 
        scene.add(ambientLight);

        // Helper Grid zodat je altijd de vloer ziet
        const gridHelper = new THREE.GridHelper(30, 30, 0x444444, 0x222222);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);

        // Gouden Zonlicht
        const sunLight = new THREE.DirectionalLight(0xfffaed, 2.5);
        sunLight.castShadow = true;
        sunLight.shadow.camera.left = -30; sunLight.shadow.camera.right = 30;
        sunLight.shadow.camera.top = 30; sunLight.shadow.camera.bottom = -30;
        sunLight.shadow.camera.near = 0.1; sunLight.shadow.camera.far = 100;
        sunLight.shadow.mapSize.set(2048, 2048);
        sunLight.shadow.bias = -0.002; 
        scene.add(sunLight);

        // Zacht Maanlicht
        const moonLight = new THREE.DirectionalLight(0x5566aa, 0); 
        moonLight.position.set(-20, 30, -20);
        moonLight.castShadow = true;
        scene.add(moonLight);

        // Gouden Bol in de lucht
        const sunSphereMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 1 });
        const sunSphere = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), sunSphereMat);
        scene.add(sunSphere);

        const arrowHelper = new THREE.ArrowHelper(new THREE.Vector3(0, 0, -1), new THREE.Vector3(0, 0.1, 0), 10, 0xff0000);
        scene.add(arrowHelper);

        let modelGroup = new THREE.Group();
        scene.add(modelGroup);

        function getMapPoint(x, y) {
            let rad = roomRotation * Math.PI / 180;
            let rx = x * Math.cos(rad) + y * Math.sin(rad);
            let ry = -x * Math.sin(rad) + y * Math.cos(rad);
            let dLat = (ry / earthRadius) * (180 / Math.PI);
            let dLng = (rx / (earthRadius * Math.cos(lat * Math.PI / 180))) * (180 / Math.PI);
            return [lat + dLat, lng + dLng];
        }

        // --- 3D MODEL OPBOUW ---
        function build3DModel() {
            modelGroup.clear();
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.DoubleSide });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.DoubleSide });

            const floor = new THREE.Mesh(new THREE.BoxGeometry(10, 0.2, 10), floorMat);
            floor.receiveShadow = true;
            modelGroup.add(floor);

            const terrace = new THREE.Mesh(new THREE.BoxGeometry(10, 0.2, 4), floorMat);
            terrace.position.set(0, 0, 7);
            terrace.receiveShadow = true;
            modelGroup.add(terrace);

            const personMat = new THREE.MeshStandardMaterial({ color: 0x3498db });
            const personBody = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1, 8, 16), personMat);
            personBody.position.set(-2, 0.8, 7);
            personBody.castShadow = true;
            modelGroup.add(personBody);

            const createWall = (w, h, d, x, y, z) => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                wall.position.set(x, y, z);
                wall.castShadow = true;
                wall.receiveShadow = true;
                modelGroup.add(wall);
            };

            createWall(10.2, 3, 0.3, 0, 1.5, -5); 
            createWall(0.3, 3, 10.2, -5, 1.5, 0); 
            createWall(0.3, 3, 10.2, 5, 1.5, 0);  
            createWall(2.8, 3, 0.3, -3.6, 1.5, 5.1); 
            createWall(2.8, 3, 0.3, 3.6, 1.5, 5.1);
            createWall(4.4, 0.6, 0.3, 0, 2.7, 5.1); 

            if (document.getElementById('wallsToggle').checked) {
                createWall(0.3, 3, 4, -5, 1.5, 7); 
                createWall(0.3, 3, 4, 5, 1.5, 7);
            }

            if (document.getElementById('roofToggle').checked) {
                const roof = new THREE.Mesh(new THREE.BoxGeometry(10.4, 0.3, 14.4), wallMat);
                roof.position.set(0, 3.1, 2);
                roof.castShadow = true;
                roof.receiveShadow = true;
                modelGroup.add(roof);
            }
        }

        function handleModelChange() {
            build3DModel();
            updateSimulation();
        }

        // --- HOOFD SIMULATIE ---
        function updateSimulation() {
            let sunPos = SunCalc.getPosition(currentDate, lat, lng);
            let azimuth = sunPos.azimuth; 
            let altitude = sunPos.altitude;

            const dist = 50;
            const x = -dist * Math.sin(azimuth) * Math.cos(altitude);
            const y = dist * Math.sin(altitude);
            const z = dist * Math.cos(azimuth) * Math.cos(altitude);

            sunLight.position.set(x, y, z);
            sunSphere.position.set(x, y, z);
            
            // Dag & Nacht controle
            if (altitude > 0) {
                sunLight.intensity = 2.8;
                moonLight.intensity = 0; 
                let warmFactor = Math.max(0, 1 - (altitude * 2));
                sunLight.color.setHSL(0.12 - (warmFactor * 0.05), 1, 0.6);
                sunSphere.visible = true;
                scene.background = new THREE.Color(0x0a0a1a);
            } else {
                sunLight.intensity = 0; 
                moonLight.intensity = 0.5; 
                sunSphere.visible = false;
                scene.background = new THREE.Color(0x020205); 
            }

            modelGroup.rotation.y = (180 - roomRotation) * Math.PI / 180;
            document.getElementById('timeOverlay3D').textContent = currentDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            // 2D Kaart Update
            mapSimulationLayer.clearLayers();
            L.polygon([getMapPoint(-s,s), getMapPoint(s,s), getMapPoint(s,-s), getMapPoint(-s,-s)], {color:'#000', weight:2, fillColor:'#fff', fillOpacity:0.5}).addTo(mapSimulationLayer);
            L.polygon([getMapPoint(-s,s), getMapPoint(s,s), getMapPoint(s,s+tD), getMapPoint(-s,s+tD)], {color:'#555', weight:1, fillColor:'#bbb', fillOpacity:0.4}).addTo(mapSimulationLayer);
            L.polyline([getMapPoint(-w,s), getMapPoint(w,s)], {color:'#3498db', weight:4}).addTo(mapSimulationLayer);

            document.getElementById('sunInfo').innerHTML = 
                `<strong>Locatie:</strong> ${lat.toFixed(4)}, ${lng.toFixed(4)}<br>` +
                `<strong>Hoogte:</strong> ${(altitude * 180 / Math.PI).toFixed(1)}°`;
        }

        // --- FIX: Window Resize Listener ---
        // Resize wordt nu netjes geregeld bij het aanpassen van de window, niet in de animatieloop
        window.addEventListener('resize', () => {
            if(viewerDiv.clientWidth > 0 && viewerDiv.clientHeight > 0) {
                camera.aspect = viewerDiv.clientWidth / viewerDiv.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(viewerDiv.clientWidth, viewerDiv.clientHeight);
            }
        });

        // --- CONTROLS ---
        timeSlider.oninput = function() {
            currentDate.setHours(Math.floor(this.value / 60), this.value % 60);
            document.getElementById('timeVal').textContent = currentDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            updateSimulation();
        };

        document.getElementById('rotationSlider').oninput = function() {
            roomRotation = parseInt(this.value);
            document.getElementById('rotationVal').textContent = roomRotation;
            updateSimulation();
        };

        document.getElementById('datePicker').onchange = function() {
            let d = new Date(this.value);
            currentDate.setFullYear(d.getFullYear(), d.getMonth(), d.getDate());
            updateSimulation();
        };

        function setSeason(s) {
            let y = 2026;
            if(s === 'zomer') currentDate = new Date(y, 5, 21, 12, 0);
            if(s === 'winter') currentDate = new Date(y, 11, 21, 12, 0);
            if(s === 'nu') {
                currentDate = new Date();
                currentDate.setHours(12, 0, 0, 0); 
            }
            datePicker.valueAsDate = currentDate;
            timeSlider.value = currentDate.getHours() * 60 + currentDate.getMinutes();
            // Forceer update van UI
            timeSlider.dispatchEvent(new Event('input'));
        }

        let isPlaying = false, animationInterval;
        function togglePlay() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                document.getElementById('playBtn').innerHTML = '⏸ Pauze';
                animationInterval = setInterval(() => {
                    timeSlider.value = (parseInt(timeSlider.value) + 5) % 1440;
                    timeSlider.dispatchEvent(new Event('input'));
                }, 50);
            } else {
                document.getElementById('playBtn').innerHTML = '▶ Play';
                clearInterval(animationInterval);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls3d.update(); // Zorgt voor soepele muisbewegingen
            renderer.render(scene, camera);
        }

        // --- START APPLICATIE ---
        // Forceer een propere start-tijd zodat je altijd daglicht hebt
        setSeason('nu');
        build3DModel();
        animate();
    </script>
</body>
</html>
